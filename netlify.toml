[build]
  publish = "."
  command = "# no build step — static site"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Блокуємо публічний доступ до внутрішніх файлів (лишаються в репо, але не віддаються відвідувачам/ботам)
[[redirects]]
  from = "/CLAUDE.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/HANDOFF.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/ROADMAP.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/README.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/package.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/ai-claude-seo-main/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/tests/*"
  to = "/404.html"
  status = 404
  force = true
