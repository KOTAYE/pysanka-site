<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Відправлення замовлення — Писан·ка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Arsenal:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Arsenal', sans-serif; background: #f7f7f7; color: #181818;
    margin: 0; padding: 30px 16px; line-height: 1.5;
  }
  .ship-card {
    max-width: 460px; margin: 0 auto; background: #fff;
    border: 1px solid #ececec; padding: 30px 28px;
  }
  .ship-head { text-align: center; margin-bottom: 24px; }
  .ship-head .logo { font-size: 26px; font-weight: 700; }
  .ship-head .logo span { color: #E97000; }
  .ship-head p { color: #6a6a6a; font-size: 14px; margin: 6px 0 0; }
  label { display: block; font-size: 13px; font-weight: 700; margin: 14px 0 5px; }
  input, select {
    width: 100%; font-family: inherit; font-size: 15px; padding: 11px 13px;
    border: 1px solid #d4d4d4; border-radius: 2px; background: #fff; color: #181818;
  }
  input:focus, select:focus { outline: none; border-color: #E97000; }
  .ship-btn {
    width: 100%; margin-top: 22px; padding: 13px; border: none; cursor: pointer;
    background: #E97000; color: #fff; font-family: inherit; font-size: 16px; font-weight: 700;
  }
  .ship-btn:hover { background: #c45e00; }
  .ship-btn:disabled { opacity: 0.6; cursor: default; }
  .ship-msg { margin-top: 18px; padding: 12px 14px; font-size: 14px; display: none; }
  .ship-msg.ok { display: block; background: #eaf7ea; border-left: 3px solid #2e9e44; }
  .ship-msg.err { display: block; background: #fdeaea; border-left: 3px solid #d43a3a; }
  .hint { font-size: 12px; color: #9e9e9e; margin-top: 4px; }
  .remember { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 13px; font-weight: 400; }
  .remember input { width: auto; }
</style>
</head>
<body>
  <div class="ship-card">
    <div class="ship-head">
      <div class="logo">Писан<span>•</span>ка</div>
      <p>Надіслати покупцю лист «відправлено» з ТТН</p>
    </div>

    <form id="ship-form" onsubmit="return sendShip(event)">
      <label>Пароль доступу *</label>
      <input type="password" id="s-secret" required placeholder="Ваш пароль">
      <label class="remember"><input type="checkbox" id="s-remember"> Запам'ятати пароль на цьому пристрої</label>

      <label>Номер замовлення *</label>
      <input type="text" id="s-order" required placeholder="P0722-1702">
      <div class="hint">З листа «Нове замовлення №…», що прийшов вам.</div>

      <label>Email покупця *</label>
      <input type="email" id="s-email" required placeholder="pokupets@email.com">

      <label>Ім'я покупця</label>
      <input type="text" id="s-name" placeholder="Марія">

      <label>Служба доставки</label>
      <select id="s-carrier">
        <option value="Нова Пошта">Нова Пошта</option>
        <option value="Укрпошта">Укрпошта</option>
        <option value="Meest">Meest</option>
      </select>

      <label>Номер ТТН *</label>
      <input type="text" id="s-ttn" required placeholder="20451491719637">

      <button type="submit" class="ship-btn" id="s-btn">Надіслати лист покупцю</button>
      <div class="ship-msg" id="s-msg"></div>
    </form>
  </div>

<script>
  // Відновити збережений пароль
  (function() {
    const saved = localStorage.getItem('ship_secret');
    if (saved) { document.getElementById('s-secret').value = saved; document.getElementById('s-remember').checked = true; }
  })();

  async function sendShip(e) {
    e.preventDefault();
    const btn = document.getElementById('s-btn');
    const msg = document.getElementById('s-msg');
    msg.className = 'ship-msg';
    const secret = document.getElementById('s-secret').value;

    if (document.getElementById('s-remember').checked) localStorage.setItem('ship_secret', secret);
    else localStorage.removeItem('ship_secret');

    const payload = {
      secret: secret,
      orderNumber: document.getElementById('s-order').value.trim(),
      email: document.getElementById('s-email').value.trim(),
      name: document.getElementById('s-name').value.trim(),
      carrier: document.getElementById('s-carrier').value,
      ttn: document.getElementById('s-ttn').value.trim(),
    };

    btn.disabled = true; btn.textContent = 'Надсилаємо…';
    try {
      const res = await fetch('/.netlify/functions/ship', {
        method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (res.ok && data.ok) {
        msg.className = 'ship-msg ok';
        msg.textContent = '✓ Лист надіслано покупцю на ' + payload.email;
        document.getElementById('s-order').value = '';
        document.getElementById('s-email').value = '';
        document.getElementById('s-name').value = '';
        document.getElementById('s-ttn').value = '';
      } else {
        msg.className = 'ship-msg err';
        msg.textContent = '✕ ' + (data.error || 'Помилка. Спробуйте ще раз.');
      }
    } catch (err) {
      msg.className = 'ship-msg err';
      msg.textContent = '✕ Помилка мережі. Спробуйте ще раз.';
    } finally {
      btn.disabled = false; btn.textContent = 'Надіслати лист покупцю';
    }
    return false;
  }
</script>
</body>
</html>
